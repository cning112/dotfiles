# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"   # true color support
set -g history-limit 10000
set -sg escape-time 0                             # no ESC key delay (important for vim)
set -g focus-events on                            # pass focus events to apps (vim, etc.)
set -g base-index 1                               # windows start at 1
setw -g pane-base-index 1                         # panes start at 1
set -g renumber-windows on                        # renumber on close
set -g display-time 2000                          # status message display time (ms)


# ── Prefix: Ctrl+a (easier than default Ctrl+b) ───────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix                              # Ctrl+a Ctrl+a sends literal Ctrl+a


# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"


# ── Mouse ─────────────────────────────────────────────────────────────────────
set -g mouse on


# ── Vi mode ───────────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi H   send-keys -X start-of-line
bind-key -T copy-mode-vi L   send-keys -X end-of-line

# Clipboard integration: macOS / WSL2 / Linux
if-shell "uname | grep -q Darwin" {
    bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    if-shell "grep -qi microsoft /proc/version 2>/dev/null" {
        bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"
        bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"
    } {
        bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input"
        bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || xsel --clipboard --input"
    }
}


# ── Windows & Panes ───────────────────────────────────────────────────────────
bind c new-window      -c "#{pane_current_path}"  # new window in current dir
bind | split-window -h -c "#{pane_current_path}"  # vertical split
bind - split-window -v -c "#{pane_current_path}"  # horizontal split
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1


# ── Status bar (Catppuccin Mocha palette) ─────────────────────────────────────
set -g status-position bottom
set -g status-style          "bg=#1e1e2e fg=#cdd6f4"
set -g status-left-length  30
set -g status-right-length 50
set -g status-left  "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6e3a1] %Y-%m-%d #[fg=#89dceb,bold] %H:%M "

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[fg=#f38ba8,bold] #I:#W "
setw -g window-status-current-style  "fg=#f38ba8,bold"

set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style            "bg=#313244 fg=#cdd6f4"
