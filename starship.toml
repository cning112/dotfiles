# Starship prompt configuration
# https://starship.rs/config/
# Run 'starship explain' to see what each module is showing

command_timeout = 1000

# Two-line prompt: info line + input line
format = """
$username$hostname$directory$git_branch$git_status$git_state\
$nodejs$python$rust$golang$java$docker_context\
$cmd_duration
$status$character"""

# ── Character ─────────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
truncation_length   = 4
truncate_to_repo    = true
style               = "bold blue"
read_only           = " 󰌾"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
format      = '([\[$all_status$ahead_behind\]]($style) )'
style       = "bold yellow"
conflicted  = "⚡"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
untracked   = "?"
stashed     = "≡"
modified    = "!"
staged      = "+"
renamed     = "»"
deleted     = "✘"

# ── Languages (shown only when in a relevant project) ─────────────────────────
[nodejs]
symbol       = " "
style        = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol       = " "
style        = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile", "setup.py"]

[rust]
symbol       = " "
style        = "bold red"
detect_files = ["Cargo.toml"]

[golang]
symbol       = " "
style        = "bold cyan"
detect_files = ["go.mod"]

[java]
symbol       = " "
style        = "bold red"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

# ── Docker ────────────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
style  = "bold blue"
only_with_files = true

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format   = "took [$duration](bold yellow) "

# ── Exit status ───────────────────────────────────────────────────────────────
[status]
style    = "bold red"
symbol   = "✗"
format   = '[$symbol $status]($style) '
disabled = false

# ── Username (only shown when SSH'd or root) ──────────────────────────────────
[username]
show_always  = false
format       = "[$user]($style)@"
style_root   = "bold red"
style_user   = "bold yellow"

[hostname]
ssh_only = true
format   = "[$hostname](bold green) in "
